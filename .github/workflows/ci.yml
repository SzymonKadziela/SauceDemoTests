name: SauceDemo Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Przywróć zależności
        run: dotnet restore

      - name: Zbuduj projekt
        run: dotnet build --no-restore

      - name: Zainstaluj przeglądarki Playwright
        run: pwsh SauceDemoTests/bin/Debug/net10.0/playwright.ps1 install --with-deps

      - name: Uruchom testy
        run: dotnet test --no-build